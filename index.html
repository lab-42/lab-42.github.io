            /* single side */
            div#header {
                width: 800px;
                height: 170px;
                border-bottom: 1px solid #f5f5f5;
                background: #fff;
                margin: 0px auto 10px auto;
            }

            /* blog info*/
            div#blog-info {
                position: absolute;
                margin: 50px 0px 0px 55px;
            }

            div#blog-info h1 {
                text-align: left;
            }

            div#blog-info h1 a {
                color: #000000;
            }

            div#blog-info h1 a:hover {
                text-decoration: underline;
            }

            div#blog-info p.description {
                margin: 0px 0px 0px 50px;
                padding: 0px;
                font: normal 16px "Trebuchet MS",Tahoma,sans-serif,Verdana,arial;
                border: none;
                color: #666666;
            }

            /* content */
            /* content define */
            div#container {
                width: 800px;
                margin: auto;
                padding: 0px;
                background: #000000;
                clear: both;
                display: block;
            }

            div#content {
                width: 560px;
                padding: 10px 0px 10px 15px;
                float: left;
                text-align: left;
                background: #ffffff;
            }

            div.post {
                padding: 30px 0px 0px 0px;
                clear: both;
                display: block;
            }

            h2.title {
                padding: 10px 0px 0px 0px;
                margin: 0px;
            }

            h3.title {
                padding: 5px 0px 0px 0px;
                margin: 10px 0px 0px 0px;
            }

            h3.title,h2.title a {
                color: #454545;
                ; }

            h3.title,h2.title a:hover {
                color: #121212;
            }

            p.search-result {
                border-bottom: 1px dotted #cdcdcd;
            }

            div.meta {
                margin: 5px 0px 0px;
                clear: both;
            }

            div.meta-bottom {
                border-top: 1px solid #999999;
                clear: both;
                background: #7f7f7f;
